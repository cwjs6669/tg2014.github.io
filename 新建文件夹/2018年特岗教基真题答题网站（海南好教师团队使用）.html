    &lt;style&gt;
        :root {
            --primary: #0A4737;
            --primary-light: #166551;
            --background: #F0F4F2;
            --accent: #FF6421;
            --gold: #D4AF37;
        }
        body { background: radial-gradient(circle at top right, #FFFFFF, var(--background)); color: #1F2937; overflow-x: hidden; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        .page { display: none; }
        .page.active { display: flex; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(10, 71, 55, 0.15);
        }
        .hero-title {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        .start-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            box-shadow: 0 10px 20px -5px rgba(10, 71, 55, 0.4);
            position: relative;
            overflow: hidden;
        }
        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .start-btn:hover::after {
            left: 120%;
        }
        .stat-badge {
            border-left: 3px solid var(--gold);
        }
        
        .score-sticky {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(10, 71, 55, 0.1);
        }

        .btn-option { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1.5px solid #E5E7EB; cursor: pointer; }
        .btn-option.selected { border-color: var(--primary); background-color: #F0FDF4; }
        .btn-option.correct { border-color: #10B981; background-color: #ECFDF5; }
        .btn-option.wrong { border-color: #EF4444; background-color: #FEF2F2; }

        .btn-next {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23);
        }
        
        .submit-btn {
            background: var(--primary);
            color: white;
            transition: all 0.3s ease;
        }
        .submit-btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
            opacity: 0.7;
        }
    &lt;/style&gt;

            { type: &quot;多选题&quot;, q: &quot;48. 教师实现专业能力提升的基本途径（）。&quot;, options: [&quot;A. 实践&quot;, &quot;B. 反思&quot;, &quot;C. 写教案&quot;, &quot;D. 观摩&quot;], correct: [0, 1, 3], analysis: &quot;解析：实践与反思是核心途径。考点：教师专业发展&quot; },
            { type: &quot;多选题&quot;, q: &quot;49. 下列违背了教师职业道德规范的是（）。&quot;, options: [&quot;A. 收家长购物卡&quot;, &quot;B. 收学生贺卡&quot;, &quot;C. 让家长送其回家&quot;, &quot;D. 布置过量练习&quot;], correct: [0, 2, 3], analysis: &quot;解析：收受财物、利用家长资源、加重负担均违规。考点：教师职业道德&quot; },
            { type: &quot;多选题&quot;, q: &quot;50. 教师的教育激励和评价能力主要包括（）&quot;, options: [&quot;A. 赏识点滴进步&quot;, &quot;B. 多元评价方式&quot;, &quot;C. 改进教学&quot;, &quot;D. 公布成绩排名&quot;], correct: [0, 1, 2], analysis: &quot;解析：保护隐私不排名。考点：教师专业标准&quot; }

        let currentIdx = 0;
        let score = 0;
        let selectedIndices = [];
        let answered = false;
        let bgmCtx = null;

        const welcomeSfx = new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/km49CuR27fZd55k7VtY4DH.mp3');

        function initBGM() {
            if (bgmCtx) return;
            bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
            const progression = [293.66, 220, 246.94, 185, 196, 146.83, 196, 220]; 
            let time = bgmCtx.currentTime;
            function schedulePiano() {
                progression.forEach((freq, i) =&gt; {
                    const startTime = time + i * 2;
                    playNote(freq, startTime, 1.8);
                    playNote(freq * 1.5, startTime + 0.5, 1.3);
                    playNote(freq * 2, startTime + 1.0, 0.8);
                });
                time += progression.length * 2;
                setTimeout(schedulePiano, progression.length * 2000 - 500);
            }
            function playNote(freq, start, duration) {
                const osc = bgmCtx.createOscillator();
                const gain = bgmCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.05, start + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                osc.connect(gain); gain.connect(bgmCtx.destination);
                osc.start(start); osc.stop(start + duration);
            }
            schedulePiano();
        }

        function toggleMusic() {
            if (!bgmCtx) initBGM();
            if (bgmCtx.state === 'suspended') { bgmCtx.resume(); document.getElementById('musicBtn').innerText = '🎵'; }
            else { bgmCtx.suspend(); document.getElementById('musicBtn').innerText = '🔇'; }
        }

        function startQuiz() {
            welcomeSfx.play();
            setTimeout(() =&gt; { initBGM(); if (bgmCtx &amp;&amp; bgmCtx.state === 'suspended') bgmCtx.resume(); }, 3000);
            showPage('quizPage');
            loadQuestion();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p =&gt; p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadQuestion() {
            answered = false; selectedIndices = [];
            const q = quizData[currentIdx];
            document.getElementById('qTypeLabel').innerText = q.type;
            document.getElementById('progressLabel').innerText = `${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('feedbackArea').classList.add('hidden');
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, idx) =&gt; {
                const btn = document.createElement('button');
                btn.className = 'btn-option w-full p-4 text-left rounded-2xl bg-white flex items-center gap-3 font-medium';
                btn.innerHTML = `&lt;span class=&quot;w-8 h-8 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-xs font-bold&quot;&gt;${String.fromCharCode(65 + idx)}&lt;/span&gt;${opt}`;
                btn.onclick = () =&gt; selectOption(idx, btn);
                container.appendChild(btn);
            });
            const submitBtn = document.getElementById('submitBtn');
            if (q.type === '多选题') { submitBtn.classList.remove('hidden'); submitBtn.disabled = true; }
            else { submitBtn.classList.add('hidden'); }
        }

        function selectOption(idx, btn) {
            if (answered) return;
            const q = quizData[currentIdx];
            if (q.type === '多选题') {
                if (selectedIndices.includes(idx)) { selectedIndices = selectedIndices.filter(i =&gt; i !== idx); btn.classList.remove('selected'); }
                else { selectedIndices.push(idx); btn.classList.add('selected'); }
                document.getElementById('submitBtn').disabled = selectedIndices.length === 0;
            } else { selectedIndices = [idx]; checkAnswer(); }
        }

        function submitAnswer() { if (selectedIndices.length === 0) return; checkAnswer(); }

        function checkAnswer() {
            answered = true;
            const q = quizData[currentIdx];
            document.getElementById('submitBtn').classList.add('hidden');
            const isCorrect = Array.isArray(q.correct) ? JSON.stringify(selectedIndices.sort()) === JSON.stringify(q.correct.sort()) : selectedIndices[0] === q.correct;
            const banner = document.getElementById('resultBanner');
            const options = document.querySelectorAll('.btn-option');
            if (isCorrect) {
                score++; document.getElementById('scoreDisplay').innerText = score;
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-green-50 text-green-700';
                banner.innerHTML = '&lt;span&gt;✅&lt;/span&gt; 回答正确！积分 +1';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('correct'));
            } else {
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-red-50 text-red-700';
                banner.innerHTML = '&lt;span&gt;❌&lt;/span&gt; 遗憾错误';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('wrong'));
                const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
                correctArr.forEach(idx =&gt; options[idx].classList.add('correct'));
            }
            document.getElementById('analysisText').innerText = q.analysis;
            document.getElementById('feedbackArea').classList.remove('hidden');
        }

        function handleNext() { currentIdx++; if (currentIdx &lt; quizData.length) loadQuestion(); else showResult(); }

        function showResult() { showPage('resultPage'); document.getElementById('finalScore').innerText = score; }

        anime({ targets: '.glass-card', translateY: [30, 0], opacity: [0, 1], duration: 1000, easing: 'easeOutQuart' });
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
