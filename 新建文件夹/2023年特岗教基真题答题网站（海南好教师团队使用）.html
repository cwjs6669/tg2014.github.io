    &lt;style&gt;
        :root {
            --primary: #0A4737;
            --primary-light: #166551;
            --background: #F0F4F2;
            --accent: #FF6421;
            --gold: #D4AF37;
        }
        body { background: radial-gradient(circle at top right, #FFFFFF, var(--background)); color: #1F2937; overflow-x: hidden; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        .page { display: none; }
        .page.active { display: flex; }
        
        /* 高端封面样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(10, 71, 55, 0.15);
        }
        .hero-title {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        .start-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            box-shadow: 0 10px 20px -5px rgba(10, 71, 55, 0.4);
            position: relative;
            overflow: hidden;
        }
        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .start-btn:hover::after {
            left: 120%;
        }
        .stat-badge {
            border-left: 3px solid var(--gold);
        }
        
        .score-sticky {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(10, 71, 55, 0.1);
        }

        .btn-option { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1.5px solid #E5E7EB; cursor: pointer; }
        .btn-option.selected { border-color: var(--primary); background-color: #F0FDF4; }
        .btn-option.correct { border-color: #10B981; background-color: #ECFDF5; }
        .btn-option.wrong { border-color: #EF4444; background-color: #FEF2F2; }

        .btn-next {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23);
        }

            background: var(--primary);
            color: white;
            transition: all 0.3s ease;
        }

        const quizData = [
            { type: &quot;单选题&quot;, q: &quot;1. 教育部《关于加强和改进新时代师德师风建设意见》指出，评价教师队伍素质的第一标准是（）&quot;, options: [&quot;A. 师德师风&quot;, &quot;B. 教学水平&quot;, &quot;C. 师生关系&quot;, &quot;D. 学历职称&quot;], correct: 0, analysis: &quot;解析：师德师风是评价教师队伍素质的第一标准。考点：教师职业道德 &mdash; 师德师风建设&quot; },
            { type: &quot;单选题&quot;, q: &quot;2. &ldquo;了解幼小和小初衔接阶段小学生心理特点，掌握帮助小学生顺利过渡方法&rdquo; 属于《小学教师专业标准》专业知识中的（）&quot;, options: [&quot;A. 通史知识&quot;, &quot;B. 学科知识&quot;, &quot;C. 教育教学知识&quot;, &quot;D. 小学生发展知识&quot;], correct: 3, analysis: &quot;解析：小学生发展知识包含儿童身心发展、年龄特征、过渡阶段特点。考点：教师专业标准 &mdash; 专业知识&quot; },
            { type: &quot;单选题&quot;, q: &quot;3. 《中小学德育工作指南》指出，&ldquo;初步形成规则意识和民主法治观念&rdquo; 适宜学段是（）&quot;, options: [&quot;A. 小学低年级&quot;, &quot;B. 小学高年级&quot;, &quot;C. 初中学段&quot;, &quot;D. 高中学段&quot;], correct: 1, analysis: &quot;解析：小学高年级目标：初步形成规则意识与民主法治观念。考点：德育 &mdash; 德育目标&quot; },
            { type: &quot;单选题&quot;, q: &quot;4. 《中华人民共和国教育法》指出，国家实行（）&quot;, options: [&quot;A. 九年义务教育制度&quot;, &quot;B. 十年&quot;, &quot;C. 十一年&quot;, &quot;D. 十二年&quot;], correct: 0, analysis: &quot;解析：我国实行九年义务教育制度。考点：教育法律法规 &mdash; 教育法&quot; },
            { type: &quot;单选题&quot;, q: &quot;5. &ldquo;双减&rdquo; 意见指出，小学三至六年级书面作业平均完成时间每天不超过（）&quot;, options: [&quot;A. 60 分钟&quot;, &quot;B. 90 分钟&quot;, &quot;C. 120 分钟&quot;, &quot;D. 150 分钟&quot;], correct: 0, analysis: &quot;解析：小学 3-6 年级&le;60 分钟；初中&le;90 分钟。考点：双减政策 &mdash; 作业时长&quot; },
            { type: &quot;单选题&quot;, q: &quot;6. 《中小学教师违反职业道德行为处理办法》规定，警告和记过处分期限分别是（）&quot;, options: [&quot;A. 12、6 个月&quot;, &quot;B. 6、12 个月&quot;, &quot;C. 12、24 个月&quot;, &quot;D. 24、12 个月&quot;], correct: 1, analysis: &quot;解析：警告 6 个月，记过 12 个月，降低岗位等级 / 撤职 24 个月。考点：教师职业道德 &mdash; 处分期限&quot; },
            { type: &quot;单选题&quot;, q: &quot;7. 无偿为社会及社区公共事务提供服务劳动属于（）&quot;, options: [&quot;A. 生产劳动&quot;, &quot;B. 家务劳动&quot;, &quot;C. 公益性劳动&quot;, &quot;D. 自我服务劳动&quot;], correct: 2, analysis: &quot;解析：公益性劳动是为社会、社区、他人无偿服务的劳动。考点：劳动教育 &mdash; 劳动类型&quot; },
            { type: &quot;单选题&quot;, q: &quot;8. 我国现行学校教育系统中基础教育体系包括（）&quot;, options: [&quot;A. 初中、中等、高等&quot;, &quot;B. 义务教育、普高、职技&quot;, &quot;C. 学前、义务教育、职教&quot;, &quot;D. 学前、义务教育、普通高中&quot;], correct: 3, analysis: &quot;解析：基础教育 = 学前 + 义务教育 + 普通高中。考点：学制 &mdash; 基础教育体系&quot; },
            { type: &quot;单选题&quot;, q: &quot;9. 教育是 &ldquo;扎根于本能不可避免的行为&rdquo; 属于（）&quot;, options: [&quot;A. 生物起源论&quot;, &quot;B. 心理起源论&quot;, &quot;C. 劳动起源论&quot;, &quot;D. 神话起源论&quot;], correct: 0, analysis: &quot;解析：生物起源论认为教育起源于动物的生存本能。考点：教育起源学说&quot; },
            { type: &quot;单选题&quot;, q: &quot;10. &ldquo;人性本善良，万物皆备于我心&rdquo; 支持人发展动因理论是（）&quot;, options: [&quot;A. 外铄论&quot;, &quot;B. 内发论&quot;, &quot;C. 多因素论&quot;, &quot;D. 内外因交互&quot;], correct: 1, analysis: &quot;解析：内发论强调内在遗传、本性、潜能决定发展。考点：个体身心发展动因&quot; },
            { type: &quot;单选题&quot;, q: &quot;11. &ldquo;经历&rdquo;&ldquo;感受&rdquo; 等历时性行为动词常用于课程（）&quot;, options: [&quot;A. 普遍性目标&quot;, &quot;B. 体验性目标&quot;, &quot;C. 表现性目标&quot;, &quot;D. 行为目标&quot;], correct: 1, analysis: &quot;解析：体验性目标描述学生的心理感受、情绪体验。考点：课程目标分类&quot; },
            { type: &quot;单选题&quot;, q: &quot;12. 强调情感对学习意义，关注思维、情感、行为整合的是（）&quot;, options: [&quot;A. 人本主义&quot;, &quot;B. 行为主义&quot;, &quot;C. 结构主义&quot;, &quot;D. 认知主义&quot;], correct: 0, analysis: &quot;解析：人本主义重视情感、自我实现、有意义学习。考点：学习理论 &mdash; 人本主义&quot; },
            { type: &quot;单选题&quot;, q: &quot;13. 自信心增强，由关注生存转到关注教学，教师处于（）&quot;, options: [&quot;A. 非关注&quot;, &quot;B. 虚拟关注&quot;, &quot;C. 任务关注&quot;, &quot;D. 自我更新关注&quot;], correct: 2, analysis: &quot;解析：任务关注阶段：关注教学任务完成、课堂管理。考点：教师专业发展阶段&quot; },
            { type: &quot;单选题&quot;, q: &quot;14. 教学过程 &ldquo;诱导 &mdash; 学习 &mdash; 讨论 &mdash; 练习 &mdash; 评价&rdquo; 是（）&quot;, options: [&quot;A. 问答模式&quot;, &quot;B. 自学模式&quot;, &quot;C. 合作模式&quot;, &quot;D. 研究模式&quot;], correct: 2, analysis: &quot;解析：合作模式强调师生、生生互动、讨论、互评。考点：教学模式&quot; },
            { type: &quot;单选题&quot;, q: &quot;15. 维果斯基最近发展区指（）&quot;, options: [&quot;A. 下一阶段水平&quot;, &quot;B. 已发展水平&quot;, &quot;C. 超出水平&quot;, &quot;D. 掌握边缘的水平&quot;], correct: 3, analysis: &quot;解析：最近发展区 = 现有水平与即将达到水平之间的区域。考点：学习理论 &mdash; 维果斯基&quot; },
            { type: &quot;单选题&quot;, q: &quot;16. &ldquo;学会如何学习&rdquo; 实质是（）&quot;, options: [&quot;A. 掌握概念&quot;, &quot;B. 识记信息&quot;, &quot;C. 恰当使用策略&quot;, &quot;D. 养成习惯&quot;], correct: 2, analysis: &quot;解析：学会学习即掌握并灵活运用学习策略。考点：学习策略 &mdash; 元认知&quot; },
            { type: &quot;单选题&quot;, q: &quot;17. 教师制作微课应首先（）&quot;, options: [&quot;A. 分享经验&quot;, &quot;B. 制作练习&quot;, &quot;C. 制作视频&quot;, &quot;D. 教学设计&quot;], correct: 3, analysis: &quot;解析：微课先做教学设计，再制作视频与练习。考点：现代教育技术 &mdash; 微课&quot; },
            { type: &quot;单选题&quot;, q: &quot;18. 文本 + 画面比纯文本效果好，符合多媒体教学（）&quot;, options: [&quot;A. 多媒体原则&quot;, &quot;B. 控制冗余&quot;, &quot;C. 个体差异&quot;, &quot;D. 预训练&quot;], correct: 0, analysis: &quot;解析：多媒体原则：同时用语词和画面呈现学习效果更好。考点：多媒体学习理论&quot; },
            { type: &quot;单选题&quot;, q: &quot;19. &ldquo;开放教育资源&rdquo; 英文缩写是（）&quot;, options: [&quot;A. OCM&quot;, &quot;B. CNKI&quot;, &quot;C. CSCW&quot;, &quot;D. OER&quot;], correct: 3, analysis: &quot;解析：Open Educational Resources=OER。考点：教育技术 &mdash; 术语缩写&quot; },
            { type: &quot;单选题&quot;, q: &quot;20. 小学低年级混淆 &ldquo;b/d&rdquo;，根本在于（）不完善&quot;, options: [&quot;A. 大小直觉&quot;, &quot;B. 深度知觉&quot;, &quot;C. 方位知觉&quot;, &quot;D. 运动知觉&quot;], correct: 2, analysis: &quot;解析：方位知觉发展不足导致左右、上下分辨不清。考点：小学生感知觉发展&quot; },
            { type: &quot;单选题&quot;, q: &quot;21. &ldquo;有智者立长志，无志者常立志&rdquo; 反映意志（）&quot;, options: [&quot;A. 独立性&quot;, &quot;B. 果断性&quot;, &quot;C. 坚持性&quot;, &quot;D. 自制力&quot;], correct: 2, analysis: &quot;解析：坚持性 = 持之以恒，不半途而废。考点：意志品质&quot; },
            { type: &quot;单选题&quot;, q: &quot;22. 下列属于学习现象的是（）&quot;, options: [&quot;A. 膝跳反射&quot;, &quot;B. 疲劳变形&quot;, &quot;C. 暗适应&quot;, &quot;D. 背诵唐诗&quot;], correct: 3, analysis: &quot;解析：学习是由经验引起的行为或行为潜能较持久变化。考点：学习的定义&quot; },
            { type: &quot;单选题&quot;, q: &quot;23. 表扬助人为乐同学后，班级涌现更多助人行为，属于（）&quot;, options: [&quot;A. 负强化&quot;, &quot;B. 直接强化&quot;, &quot;C. 替代强化&quot;, &quot;D. 自我强化&quot;], correct: 2, analysis: &quot;解析：替代强化：观察他人行为受强化而习得行为。考点：班杜拉 &mdash; 强化分类&quot; },
            { type: &quot;单选题&quot;, q: &quot;24. 得知获奖后欢呼雀跃，情绪状态是（）&quot;, options: [&quot;A. 心境&quot;, &quot;B. 激情&quot;, &quot;C. 应激&quot;, &quot;D. 美感&quot;], correct: 1, analysis: &quot;解析：激情是强烈、短暂、爆发式的情绪。考点：情绪状态分类&quot; },
            { type: &quot;单选题&quot;, q: &quot;25. 首字连词编二十四节气歌，运用（）&quot;, options: [&quot;A. 资源管理&quot;, &quot;B. 精细加工&quot;, &quot;C. 元认知&quot;, &quot;D. 调节&quot;], correct: 1, analysis: &quot;解析：编歌诀、谐音、口诀属于精细加工策略。考点：学习策略 &mdash; 认知策略&quot; },
            { type: &quot;单选题&quot;, q: &quot;26. 斯腾伯格三元智力理论核心成分是（）&quot;, options: [&quot;A. 元成分&quot;, &quot;B. 操作成分&quot;, &quot;C. 知识获得&quot;, &quot;D. 情景成分&quot;], correct: 0, analysis: &quot;解析：元成分负责计划、监控、评价，是核心。考点：智力理论 &mdash; 三元智力&quot; },
            { type: &quot;单选题&quot;, q: &quot;27. 光线不同但认为花颜色不变，体现知觉（）&quot;, options: [&quot;A. 整体性&quot;, &quot;B. 恒常性&quot;, &quot;C. 理解性&quot;, &quot;D. 选择性&quot;], correct: 1, analysis: &quot;解析：知觉恒常性：条件改变，知觉映像相对不变。考点：知觉特性&quot; },
            { type: &quot;单选题&quot;, q: &quot;28. 用喜欢的事化解不开心，运用注意（）&quot;, options: [&quot;A. 集中&quot;, &quot;B. 分配&quot;, &quot;C. 起伏&quot;, &quot;D. 转移&quot;], correct: 3, analysis: &quot;解析：注意转移：主动把注意从一个对象转到另一对象。考点：注意品质&quot; },
            { type: &quot;单选题&quot;, q: &quot;29. 效果最好的记忆需要过度学习达到（）&quot;, options: [&quot;A. 100%&quot;, &quot;B. 20%&quot;, &quot;C. 150%&quot;, &quot;D. 200%&quot;], correct: 2, analysis: &quot;解析：过度学习 50%（总学习 150%）记忆效果最佳。考点：记忆 &mdash; 过度学习&quot; },
            { type: &quot;单选题&quot;, q: &quot;30. 热爱集体、关心他人等描述性格的（）&quot;, options: [&quot;A. 态度特征&quot;, &quot;B. 意志特征&quot;, &quot;C. 情绪特征&quot;, &quot;D. 理智特征&quot;], correct: 0, analysis: &quot;解析：态度特征：对他人、集体、社会、工作的态度。考点：性格结构特征&quot; },
            { type: &quot;多选题&quot;, q: &quot;31. 《深化新时代教育评价改革总体方案》原则（）&quot;, options: [&quot;A. 立德树人&quot;, &quot;B. 问题导向&quot;, &quot;C. 科学有效&quot;, &quot;D. 文凭优先&quot;], correct: [0, 1, 2], analysis: &quot;解析：坚持立德树人、问题导向、科学有效、统筹兼顾。考点：教育评价改革&quot; },
            { type: &quot;多选题&quot;, q: &quot;32. 古代教育相对现代教育特征（）&quot;, options: [&quot;A. 教育与生产劳动分离&quot;, &quot;B. 教育普及制度化&quot;, &quot;C. 科教人文融合&quot;, &quot;D. 教育民主化&quot;], correct: [1, 2, 3], analysis: &quot;解析：古代教育与生产劳动相分离；BCD 为现代特征。考点：古代教育与现代教育特征&quot; },
            { type: &quot;多选题&quot;, q: &quot;33. 建构主义指导的教学模式（）&quot;, options: [&quot;A. 交互式&quot;, &quot;B. 程序式&quot;, &quot;C. 支架式&quot;, &quot;D. 情景式&quot;], correct: [0, 2, 3], analysis: &quot;解析：建构主义：支架、情境、交互式、抛锚式；程序式是行为主义。考点：学习理论 &mdash; 建构主义&quot; },
            { type: &quot;多选题&quot;, q: &quot;34. 奥苏伯尔学业内驱力（）&quot;, options: [&quot;A. 认知内驱力&quot;, &quot;B. 自我提高&quot;, &quot;C. 人际关系&quot;, &quot;D. 附属&quot;], correct: [0, 1, 3], analysis: &quot;解析：奥苏贝尔三驱力：认知、自我提高、附属。考点：学习动机分类&quot; },
            { type: &quot;多选题&quot;, q: &quot;35. 小学生心理发展一般特征（）&quot;, options: [&quot;A. 快速性&quot;, &quot;B. 协调性&quot;, &quot;C. 封闭性&quot;, &quot;D. 退行性&quot;], correct: [0, 1], analysis: &quot;解析：小学生心理：快速性、协调性、开放性、可塑性。考点：小学生心理发展特点&quot; },
            { type: &quot;判断题&quot;, q: &quot;36. 潜心钻研、勇于创新、提高素养属于终身学习。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：终身学习要求不断提升专业能力与素养。考点：教师职业道德&quot; },
            { type: &quot;判断题&quot;, q: &quot;37. 培养目标根据国家教育目的制定。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：教育目的&rarr;培养目标&rarr;课程目标&rarr;教学目标。考点：教育目的层次&quot; },
            { type: &quot;判断题&quot;, q: &quot;38. 教育研究实施只为实现目的，对方法步骤做整体规划。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：研究设计阶段做整体规划，实施阶段是执行。考点：教育研究方法&quot; },
            { type: &quot;判断题&quot;, q: &quot;39. 德育只能按知、情、意、行顺序进行。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：德育具有多开端性，可从任意一端开始。考点：德育过程规律&quot; },
            { type: &quot;判断题&quot;, q: &quot;40. 纸上得来终觉浅，因此学习间接知识无意义。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：学生以学习间接经验为主，直接经验辅助。考点：教学过程规律&quot; },
            { type: &quot;判断题&quot;, q: &quot;41. 突然被吵闹声吸引是有意注意。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：无意注意：无目的、不需意志努力、被动吸引。考点：注意分类&quot; },
            { type: &quot;判断题&quot;, q: &quot;42. 美育含自然美、艺术美、社会美、科学美，艺术教育是核心。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：艺术教育是美育核心内容与主要途径。考点：美育内容&quot; },
            { type: &quot;判断题&quot;, q: &quot;43. 皮亚杰认为儿童小学阶段获得守恒。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：具体运算阶段（7-11 岁）获得守恒。考点：皮亚杰认知发展阶段&quot; },
            { type: &quot;判断题&quot;, q: &quot;44. 喝苦药后喝白开水觉得甜是感觉适应。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：这是感觉对比，不是适应。考点：感觉现象&quot; },
            { type: &quot;判断题&quot;, q: &quot;45. 学习中兴趣、好奇属于理智感。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：理智感是认知活动中产生的情感体验。考点：情感分类&quot; },
            { type: &quot;判断题&quot;, q: &quot;46. 华生按学习内容分为接受学习与发现学习。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：奥苏贝尔划分接受学习与发现学习。考点：学习分类&quot; },
            { type: &quot;判断题&quot;, q: &quot;47. 小学生抽象逻辑思维随年龄增长逐渐减弱。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：逐渐由具体形象向抽象逻辑过渡并增强。考点：小学生思维发展&quot; },
            { type: &quot;判断题&quot;, q: &quot;48. 观察是有目的、计划、持久的知觉，是知觉高级形式。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：观察是 &ldquo;思维的知觉&rdquo;。考点：感知觉 &mdash; 观察&quot; },
            { type: &quot;判断题&quot;, q: &quot;49. 艾宾浩斯遗忘曲线：先快后慢、先多后少。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：遗忘进程不均衡，先快后慢。考点：遗忘规律&quot; },
            { type: &quot;判断题&quot;, q: &quot;50. 学习任务越难，动机越强，效果越好。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：任务难，动机应偏低，效果更好。考点：耶克斯 &mdash; 多德森定律&quot; }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedIndices = [];
        let answered = false;
        let bgmCtx = null;

        const welcomeSfx = new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/d66MqYJtHRH6Z4HXUkEDaV.mp3');

        function initBGM() {
            if (bgmCtx) return;
            bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
            const progression = [293.66, 220, 246.94, 185, 196, 146.83, 196, 220]; 
            let time = bgmCtx.currentTime;
            function schedulePiano() {
                progression.forEach((freq, i) =&gt; {
                    const startTime = time + i * 2;
                    playNote(freq, startTime, 1.8);
                    playNote(freq * 1.5, startTime + 0.5, 1.3);
                    playNote(freq * 2, startTime + 1.0, 0.8);
                });
                time += progression.length * 2;
                setTimeout(schedulePiano, progression.length * 2000 - 500);
            }
            function playNote(freq, start, duration) {
                const osc = bgmCtx.createOscillator();
                const gain = bgmCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.05, start + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                osc.connect(gain); gain.connect(bgmCtx.destination);
                osc.start(start); osc.stop(start + duration);
            }
            schedulePiano();
        }

        function toggleMusic() {
            if (!bgmCtx) initBGM();
            if (bgmCtx.state === 'suspended') { bgmCtx.resume(); document.getElementById('musicBtn').innerText = '🎵'; }
            else { bgmCtx.suspend(); document.getElementById('musicBtn').innerText = '🔇'; }
        }

        function startQuiz() {
            welcomeSfx.play();
            setTimeout(() =&gt; { initBGM(); if (bgmCtx &amp;&amp; bgmCtx.state === 'suspended') bgmCtx.resume(); }, 3000);
            showPage('quizPage');
            loadQuestion();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p =&gt; p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadQuestion() {
            answered = false; selectedIndices = [];
            const q = quizData[currentIdx];
            document.getElementById('qTypeLabel').innerText = q.type;
            document.getElementById('progressLabel').innerText = `${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('feedbackArea').classList.add('hidden');
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, idx) =&gt; {
                const btn = document.createElement('button');
                btn.className = 'btn-option w-full p-4 text-left rounded-2xl bg-white flex items-center gap-3 font-medium';
                btn.innerHTML = `&lt;span class=&quot;w-8 h-8 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-xs font-bold&quot;&gt;${String.fromCharCode(65 + idx)}&lt;/span&gt;${opt}`;
                btn.onclick = () =&gt; selectOption(idx, btn);
                container.appendChild(btn);
            });
            const submitBtn = document.getElementById('submitBtn');
            if (q.type === '多选题') { submitBtn.classList.remove('hidden'); submitBtn.disabled = true; }
            else { submitBtn.classList.add('hidden'); }
        }

        function selectOption(idx, btn) {
            if (answered) return;
            const q = quizData[currentIdx];
            if (q.type === '多选题') {
                if (selectedIndices.includes(idx)) { selectedIndices = selectedIndices.filter(i =&gt; i !== idx); btn.classList.remove('selected'); }
                else { selectedIndices.push(idx); btn.classList.add('selected'); }
                document.getElementById('submitBtn').disabled = selectedIndices.length === 0;
            } else { selectedIndices = [idx]; checkAnswer(); }
        }

        function submitAnswer() { if (selectedIndices.length === 0) return; checkAnswer(); }

        function checkAnswer() {
            answered = true;
            const q = quizData[currentIdx];
            document.getElementById('submitBtn').classList.add('hidden');
            const isCorrect = Array.isArray(q.correct) ? JSON.stringify(selectedIndices.sort()) === JSON.stringify(q.correct.sort()) : selectedIndices[0] === q.correct;
            const banner = document.getElementById('resultBanner');
            const options = document.querySelectorAll('.btn-option');
            if (isCorrect) {
                score++; document.getElementById('scoreDisplay').innerText = score;
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-green-50 text-green-700';
                banner.innerHTML = '&lt;span&gt;✅&lt;/span&gt; 回答正确！积分 +1';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('correct'));
            } else {
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-red-50 text-red-700';
                banner.innerHTML = '&lt;span&gt;❌&lt;/span&gt; 遗憾错误';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('wrong'));
                const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
                correctArr.forEach(idx =&gt; options[idx].classList.add('correct'));
            }
            document.getElementById('analysisText').innerText = q.analysis;
            document.getElementById('feedbackArea').classList.remove('hidden');
        }

        function handleNext() { currentIdx++; if (currentIdx &lt; quizData.length) loadQuestion(); else showResult(); }

        function showResult() { showPage('resultPage'); document.getElementById('finalScore').innerText = score; }

        anime({ targets: '.glass-card', translateY: [30, 0], opacity: [0, 1], duration: 1000, easing: 'easeOutQuart' });
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

        event.stopPropagation()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
