    &lt;style&gt;
        :root {
            --primary: #0A4737;
            --primary-light: #166551;
            --background: #F0F4F2;
            --accent: #FF6421;
            --gold: #D4AF37;
        }
        body { background: radial-gradient(circle at top right, #FFFFFF, var(--background)); color: #1F2937; overflow-x: hidden; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        .page { display: none; }
        .page.active { display: flex; }
        
        /* 高端封面样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(10, 71, 55, 0.15);
        }
        .hero-title {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        .start-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            box-shadow: 0 10px 20px -5px rgba(10, 71, 55, 0.4);
            position: relative;
            overflow: hidden;
        }
        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .start-btn:hover::after {
            left: 120%;
        }
        .stat-badge {
            border-left: 3px solid var(--gold);
        }
        
        .score-sticky {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(10, 71, 55, 0.1);
        }

        .btn-option { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1.5px solid #E5E7EB; cursor: pointer; }
        .btn-option.selected { border-color: var(--primary); background-color: #F0FDF4; }
        .btn-option.correct { border-color: #10B981; background-color: #ECFDF5; }
        .btn-option.wrong { border-color: #EF4444; background-color: #FEF2F2; }

        .btn-next {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.23);
        }
        
        .submit-btn {
            background: var(--primary);
            color: white;
            transition: all 0.3s ease;
        }
        .submit-btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
            opacity: 0.7;
        }
    &lt;/style&gt;

        const quizData = [
            { type: &quot;单选题&quot;, q: &quot;1. 现代教育制度的核心是（）&quot;, options: [&quot;A. 各级各类教育机构&quot;, &quot;B. 教育思想&quot;, &quot;C. 教育管理制度&quot;, &quot;D. 学制&quot;], correct: 3, analysis: &quot;解析：狭义教育制度即学制，是现代教育制度的核心与主体。考点：教育学 &mdash; 教育制度 &mdash; 学制&quot; },
            { type: &quot;单选题&quot;, q: &quot;2. 标志科学教育学诞生的是（）&quot;, options: [&quot;A. 夸美纽斯《大教学论》&quot;, &quot;B. 洛克《教育漫话》&quot;, &quot;C. 杜威《民主主义与教育》&quot;, &quot;D. 赫尔巴特《普通教育学》&quot;], correct: 3, analysis: &quot;解析：赫尔巴特《普通教育学》标志教育学成为规范、科学的独立学科。考点：教育学 &mdash; 创立阶段 &mdash; 赫尔巴特&quot; },
            { type: &quot;单选题&quot;, q: &quot;3. &ldquo;双减&rdquo; 指减轻义务教育阶段学生的（）&quot;, options: [&quot;A. 家长精力负担&quot;, &quot;B. 教师教学负担&quot;, &quot;C. 作业负担、校外培训负担&quot;, &quot;D. 家庭教育支出负担&quot;], correct: 2, analysis: &quot;解析：双减即减轻作业负担和校外培训负担。考点：教育政策 &mdash; 双减&quot; },
            { type: &quot;单选题&quot;, q: &quot;4. 爱屋及乌属于（）&quot;, options: [&quot;A. 晕轮效应&quot;, &quot;B. 首因效应&quot;, &quot;C. 刻板印象&quot;, &quot;D. 蝴蝶效应&quot;], correct: 0, analysis: &quot;解析：以点概面、一好百好，是晕轮效应（光环效应）。考点：心理学 &mdash; 社会知觉 &mdash; 效应&quot; },
            { type: &quot;单选题&quot;, q: &quot;5. 锯掉桌子一个角仍答三个角，受（）影响&quot;, options: [&quot;A. 垂直迁移&quot;, &quot;B. 功能固着&quot;, &quot;C. 思维定势&quot;, &quot;D. 原型启发&quot;], correct: 2, analysis: &quot;解析：先前思维习惯形成定势，阻碍新思路。考点：教育心理学 &mdash; 问题解决 &mdash; 影响因素&quot; },
            { type: &quot;单选题&quot;, q: &quot;6. 未成年人指未满（）周岁公民&quot;, options: [&quot;A. 16&quot;, &quot;B. 17&quot;, &quot;C. 18&quot;, &quot;D. 19&quot;], correct: 2, analysis: &quot;解析：《未成年人保护法》规定未满 18 周岁为未成年人。考点：教育法规 &mdash; 未成年人保护法&quot; },
            { type: &quot;单选题&quot;, q: &quot;7. 民族地区、边远贫困地区教师享有（）&quot;, options: [&quot;A. 特殊岗位补助&quot;, &quot;B. 生活补助&quot;, &quot;C. 特殊奉献补助&quot;, &quot;D. 艰苦贫困地区补助&quot;], correct: 3, analysis: &quot;解析：《义务教育法》规定此类教师享有艰苦贫困地区补助。考点：教育法规 &mdash; 义务教育法&quot; },
            { type: &quot;单选题&quot;, q: &quot;8. &ldquo;杀鸡儆猴&rdquo; 可用（）解释&quot;, options: [&quot;A. 强化论&quot;, &quot;B. 社会学习理论&quot;, &quot;C. 刺激 - 反应论&quot;, &quot;D. 从众理论&quot;], correct: 1, analysis: &quot;解析：观察学习、替代强化，属于班杜拉社会学习理论。考点：教育心理学 &mdash; 学习理论 &mdash; 班杜拉&quot; },
            { type: &quot;单选题&quot;, q: &quot;9. 马克思认为人的全面发展真正实现于（）&quot;, options: [&quot;A. 资本主义初期&quot;, &quot;B. 社会主义&quot;, &quot;C. 共产主义&quot;, &quot;D. 资本主义高度发展&quot;], correct: 2, analysis: &quot;解析：共产主义社会消灭旧式分工，实现人的全面发展。考点：教育学 &mdash; 教育目的 &mdash; 马克思主义全面发展&quot; },
            { type: &quot;单选题&quot;, q: &quot;10. 假冒品牌利用知觉的（）&quot;, options: [&quot;A. 整体性&quot;, &quot;B. 选择性&quot;, &quot;C. 理解性&quot;, &quot;D. 恒常性&quot;], correct: 0, analysis: &quot;解析：消费者整体感知，忽略细节差异，利用知觉整体性。考点：心理学 &mdash; 感知觉 &mdash; 知觉特性&quot; },
            { type: &quot;单选题&quot;, q: &quot;11. 布鲁姆认知领域层次由低到高是（）&quot;, options: [&quot;A. 知识-领会-分析-应用-综合-评价&quot;, &quot;B. 知识-领会-应用-分析-综合-评价&quot;, &quot;C. 知识-领会-应用-综合-分析-评价&quot;, &quot;D. 知识-领会-应用-分析-评价-综合&quot;], correct: 1, analysis: &quot;解析：顺序：知识&rarr;领会&rarr;应用&rarr;分析&rarr;综合&rarr;评价。考点：教育心理学 &mdash; 教学目标分类 &mdash; 布鲁姆&quot; },
            { type: &quot;单选题&quot;, q: &quot;12. &ldquo;同课异构&rdquo; 体现教师劳动（）&quot;, options: [&quot;A. 复杂性&quot;, &quot;B. 广延性&quot;, &quot;C. 长期性&quot;, &quot;D. 创造性&quot;], correct: 3, analysis: &quot;解析：同课异构强调教学设计与方法创新，体现创造性。考点：教育学 &mdash; 教师 &mdash; 劳动特点&quot; },
            { type: &quot;单选题&quot;, q: &quot;13. 下列属于核心素养 &ldquo;实践创新&rdquo; 的是（）&quot;, options: [&quot;A. 尊重多元文化&quot;, &quot;B. 安全意识&quot;, &quot;C. 复杂环境行动能力&quot;, &quot;D. 适应信息化&quot;], correct: 2, analysis: &quot;解析：实践创新包含问题解决、动手操作、复杂环境行动能力。考点：教育政策 &mdash; 学生发展核心素养&quot; },
            { type: &quot;单选题&quot;, q: &quot;14. 想法与众不同、切中要害体现思维（）&quot;, options: [&quot;A. 独创性&quot;, &quot;B. 变通性&quot;, &quot;C. 流畅性&quot;, &quot;D. 自制性&quot;], correct: 0, analysis: &quot;解析：独创性指新颖、独特、不落俗套。考点：心理学 &mdash; 思维 &mdash; 创造性思维&quot; },
            { type: &quot;单选题&quot;, q: &quot;15. 教育强国根本目标是（）&quot;, options: [&quot;A. 党的领导&quot;, &quot;B. 立德树人&quot;, &quot;C. 为党育人、为国育才&quot;, &quot;D. 服务复兴&quot;], correct: 2, analysis: &quot;解析：习近平总书记强调教育强国以 &ldquo;为党育人、为国育才&rdquo; 为根本目标。考点：教育时政 &mdash; 教育强国&quot; },
            { type: &quot;单选题&quot;, q: &quot;16. 教育评价改革：改进结果评价，强化（），探索（），健全（）&quot;, options: [&quot;A. 过程评价；增值评价；综合评价&quot;, &quot;B. 总结评价；相对评价；绝对评价&quot;, &quot;C. 诊断评价；差异评价；发展评价&quot;, &quot;D. 教师评价；学校评价；社会评价&quot;], correct: 0, analysis: &quot;解析：新政要求：改进结果、强化过程、探索增值、健全综合。考点：教育政策 &mdash; 教育评价改革&quot; },
            { type: &quot;单选题&quot;, q: &quot;17. 不符合中小学生睡眠管理要求的是（）&quot;, options: [&quot;A. 小学&ge;10h&quot;, &quot;B. 初中&ge;9h&quot;, &quot;C. 初中就寝不晚于 21:00&quot;, &quot;D. 高中&ge;8h&quot;], correct: 2, analysis: &quot;解析：初中生就寝应不晚于 22:00，C 错误。考点：教育政策 &mdash; 睡眠管理&quot; },
            { type: &quot;单选题&quot;, q: &quot;18. 下列表述错误的是（）&quot;, options: [&quot;A. 偶尔影响学生的人也算教育者&quot;, &quot;B. 亚里士多德强调理性和谐发展&quot;, &quot;C. 教育是培养人的活动&quot;, &quot;D. 学习者包括提高自身的人&quot;], correct: 0, analysis: &quot;解析：教育者是有目的、有计划施加影响的人，偶然影响不算。考点：教育学 &mdash; 教育概述&quot; },
            { type: &quot;单选题&quot;, q: &quot;19. 古代教育表述错误的是（）&quot;, options: [&quot;A. 西周 &ldquo;学在官府、政教合一&rdquo;&quot;, &quot;B. 唐代 &ldquo;二馆六学&rdquo;&quot;, &quot;C. 隋朝科举&quot;, &quot;D. 明代八股文&quot;], correct: 0, analysis: &quot;解析：&ldquo;学在官府、政教合一&rdquo; 是西周，非春秋战国。考点：教育学 &mdash; 古代教育&quot; },
            { type: &quot;单选题&quot;, q: &quot;20. 古代教育思想正确的是（）&quot;, options: [&quot;A. 子以四教 &mdash; 孟子&quot;, &quot;B. 因材施教 &mdash; 孔子提出四字&quot;, &quot;C. 仁、义、礼、智善端 &mdash; 孟子&quot;, &quot;D. 素丝说 &mdash; 墨子&quot;], correct: 2, analysis: &quot;解析：孟子提出 &ldquo;四端善端&rdquo;；孔子因材施教但未提四字；素丝说是墨子。考点：教育学 &mdash; 萌芽阶段 &mdash; 孔孟荀墨&quot; },
            { type: &quot;单选题&quot;, q: &quot;21. &ldquo;桃李不言，下自成蹊&rdquo; 体现德育方法是（）&quot;, options: [&quot;A. 说服&quot;, &quot;B. 锻炼&quot;, &quot;C. 陶冶&quot;, &quot;D. 榜样示范&quot;], correct: 3, analysis: &quot;解析：以身作则、行为示范，属于榜样示范法。考点：教育学 &mdash; 德育 &mdash; 方法&quot; },

            { type: &quot;多选题&quot;, q: &quot;40. 新课程结构特点（）&quot;, options: [&quot;A. 均衡性&quot;, &quot;B. 综合性&quot;, &quot;C. 选择性&quot;, &quot;D. 平均性&quot;], correct: [0, 1, 2], analysis: &quot;解析：新课改结构：均衡、综合、选择。考点：新课程 &mdash; 结构&quot; },

            { type: &quot;判断题&quot;, q: &quot;42. 初中生每天睡眠应达 9 小时。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：政策要求：小学 10h、初中 9h、高中 8h。考点：教育政策 &mdash; 睡眠管理&quot; },
            { type: &quot;判断题&quot;, q: &quot;43. &ldquo;军人自律&rdquo; 属于人格共同特质。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：共同特质是群体共有的人格特征。考点：心理学 &mdash; 人格特质&quot; },
            { type: &quot;判断题&quot;, q: &quot;44. &ldquo;进退维谷&rdquo; 是双避冲突。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：两个都想回避，必须选一个，属于双避冲突。考点：心理学 &mdash; 动机冲突&quot; },
            { type: &quot;判断题&quot;, q: &quot;45. 实证研究包括量化、质性、混合研究。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：实证研究三大类型分类正确。考点：教育研究方法&quot; },
            { type: &quot;判断题&quot;, q: &quot;46. 我国教育中智育最重要。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：五育并举、同等重要，无主次之分。考点：全面发展教育&quot; },
            { type: &quot;判断题&quot;, q: &quot;47. &ldquo;大器晚成&rdquo; 是智力表现早晚差异。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：能力表现早晚有早慧与大器晚成之分。考点：学生个别差异&quot; },
            { type: &quot;判断题&quot;, q: &quot;48. 注意是一种独立心理过程。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 1, analysis: &quot;解析：注意是伴随状态，非独立心理过程。考点：心理学 &mdash; 注意&quot; },
            { type: &quot;判断题&quot;, q: &quot;49. 课外辅导是因材施教重要途径。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：辅导针对个体差异，弥补课堂统一教学不足。考点：教学 &mdash; 课外辅导&quot; },
            { type: &quot;判断题&quot;, q: &quot;50. 心理健康教育属于德育范畴。&quot;, options: [&quot;正确&quot;, &quot;错误&quot;], correct: 0, analysis: &quot;解析：我国德育包含思想、政治、道德、法纪、心理健康教育。考点：教育学 &mdash; 德育内容&quot; },
            { type: &quot;案例分析题&quot;, q: &quot;案例分析 1：李老师对后进生小强失去信心并体罚。请问：1.教师职业道德提升方法有哪些？2.后进生转化的做法有哪些？3.如何维持课堂秩序？&quot;, options: [&quot;查看参考答案&quot;], correct: 0, analysis: &quot;答案：\n1.提升方法：加强学习，立足实践，自我反思，坚持慎独。\n2.转化做法：关心爱护、尊重人格，激发自信、寄予期望，挖掘闪光点、及时表扬，因材施教、持之以恒。\n3.维持课堂：建立良好开端，保持学生注意与兴趣，运用非言语线索，区别对待行为，表扬正面行为，合理运用惩罚。\n考点：教师职业道德修养、后进生教育、课堂管理&quot; },
            { type: &quot;案例分析题&quot;, q: &quot;案例分析 2：付老师自掏腰包为听障学生配助听器，并引导早恋及问题学生。请结合案例，分析教师关爱学生的基本要求。&quot;, options: [&quot;查看参考答案&quot;], correct: 0, analysis: &quot;答案：\n1.关心全体、一视同仁；\n2.尊重人格、严慈相济；\n3.保护安全、维护权益；\n4.不歧视、不体罚、不变相体罚。\n考点：教师职业道德 &mdash; 关爱学生&quot; },
            { type: &quot;案例分析题&quot;, q: &quot;案例分析 3：罗老师粗暴处理学生玩手机并翻看隐私，校长随后进行补救。请结合案例，分析校长如何践行教师的职业道德规范。&quot;, options: [&quot;查看参考答案&quot;], correct: 0, analysis: &quot;答案：\n1.关爱学生：通过安抚、道歉、开导践行关爱；\n2.为人师表：文明礼貌、尊重家长与同事；\n3.以身作则、示范引领。\n考点：教师职业道德 &mdash; 为人师表、关爱学生&quot; }
        ];

        let currentIdx = 0;
        let score = 0;
        let selectedIndices = [];
        let answered = false;
        let bgmCtx = null;

        const welcomeSfx = new Audio('https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/aDDz7pK9PdQi2H59nTFyfk.mp3');

        function initBGM() {
            if (bgmCtx) return;
            bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
            const progression = [293.66, 220, 246.94, 185, 196, 146.83, 196, 220]; 
            let time = bgmCtx.currentTime;
            function schedulePiano() {
                progression.forEach((freq, i) =&gt; {
                    const startTime = time + i * 2;
                    playNote(freq, startTime, 1.8);
                    playNote(freq * 1.5, startTime + 0.5, 1.3);
                    playNote(freq * 2, startTime + 1.0, 0.8);
                });
                time += progression.length * 2;
                setTimeout(schedulePiano, progression.length * 2000 - 500);
            }
            function playNote(freq, start, duration) {
                const osc = bgmCtx.createOscillator();
                const gain = bgmCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.05, start + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                osc.connect(gain); gain.connect(bgmCtx.destination);
                osc.start(start); osc.stop(start + duration);
            }
            schedulePiano();
        }

        function toggleMusic() {
            if (!bgmCtx) initBGM();
            if (bgmCtx.state === 'suspended') { bgmCtx.resume(); document.getElementById('musicBtn').innerText = '🎵'; }
            else { bgmCtx.suspend(); document.getElementById('musicBtn').innerText = '🔇'; }
        }

        function startQuiz() {
            welcomeSfx.play();
            setTimeout(() =&gt; { initBGM(); if (bgmCtx &amp;&amp; bgmCtx.state === 'suspended') bgmCtx.resume(); }, 3000);
            showPage('quizPage');
            loadQuestion();
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p =&gt; p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadQuestion() {
            answered = false; selectedIndices = [];
            const q = quizData[currentIdx];
            document.getElementById('qTypeLabel').innerText = q.type;
            document.getElementById('progressLabel').innerText = `${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('qText').innerText = q.q;
            document.getElementById('feedbackArea').classList.add('hidden');
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, idx) =&gt; {
                const btn = document.createElement('button');
                btn.className = 'btn-option w-full p-4 text-left rounded-2xl bg-white flex items-center gap-3 font-medium';
                btn.innerHTML = `&lt;span class=&quot;w-8 h-8 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-xs font-bold&quot;&gt;${String.fromCharCode(65 + idx)}&lt;/span&gt;${opt}`;
                btn.onclick = () =&gt; selectOption(idx, btn);
                container.appendChild(btn);
            });
            const submitBtn = document.getElementById('submitBtn');
            if (q.type === '多选题') { submitBtn.classList.remove('hidden'); submitBtn.disabled = true; }
            else { submitBtn.classList.add('hidden'); }
        }

        function selectOption(idx, btn) {
            if (answered) return;
            const q = quizData[currentIdx];
            if (q.type === '多选题') {
                if (selectedIndices.includes(idx)) { selectedIndices = selectedIndices.filter(i =&gt; i !== idx); btn.classList.remove('selected'); }
                else { selectedIndices.push(idx); btn.classList.add('selected'); }
                document.getElementById('submitBtn').disabled = selectedIndices.length === 0;
            } else { selectedIndices = [idx]; checkAnswer(); }
        }

        function submitAnswer() { if (selectedIndices.length === 0) return; checkAnswer(); }

        function checkAnswer() {
            answered = true;
            const q = quizData[currentIdx];
            document.getElementById('submitBtn').classList.add('hidden');
            const isCorrect = Array.isArray(q.correct) ? JSON.stringify(selectedIndices.sort()) === JSON.stringify(q.correct.sort()) : selectedIndices[0] === q.correct;
            const banner = document.getElementById('resultBanner');
            const options = document.querySelectorAll('.btn-option');
            if (isCorrect) {
                score++; document.getElementById('scoreDisplay').innerText = score;
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-green-50 text-green-700';
                banner.innerHTML = '&lt;span&gt;✅&lt;/span&gt; 回答正确！积分 +1';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('correct'));
            } else {
                banner.className = 'flex items-center gap-2 font-bold p-3 rounded-xl bg-red-50 text-red-700';
                banner.innerHTML = '&lt;span&gt;❌&lt;/span&gt; 遗憾错误';
                selectedIndices.forEach(idx =&gt; options[idx].classList.add('wrong'));
                const correctArr = Array.isArray(q.correct) ? q.correct : [q.correct];
                correctArr.forEach(idx =&gt; options[idx].classList.add('correct'));
            }
            document.getElementById('analysisText').innerText = q.analysis;
            document.getElementById('feedbackArea').classList.remove('hidden');
        }

        function handleNext() { currentIdx++; if (currentIdx &lt; quizData.length) loadQuestion(); else showResult(); }

        function showResult() { showPage('resultPage'); document.getElementById('finalScore').innerText = score; }

        anime({ targets: '.glass-card', translateY: [30, 0], opacity: [0, 1], duration: 1000, easing: 'easeOutQuart' });
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
